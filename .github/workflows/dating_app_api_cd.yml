name: dating_app_api CD (CloudBase)

on:
  push:
    tags:
      - "api-test-v*"
      - "api-prod-v*"

permissions:
  contents: read

jobs:
  deploy-test:
    if: startsWith(github.ref, 'refs/tags/api-test-v')
    runs-on: ubuntu-latest
    environment: test

    # cloudbaserc.json interpolates {{env.*}} at deploy time; mirror Tencent CloudBase keys and naming from .env.example.
    env:
      ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
      CLOUDBASE_SERVICE_NAME: dating-app-api-test
      NODE_ENV: production
      CORS_ENABLED: "true"
      ALLOWED_ORIGINS: "*"
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DATABASE_URL: ${{ secrets.API_TEST_DATABASE_URL }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      CLOUDBASE_STORAGE_URL: ${{ secrets.CLOUDBASE_STORAGE_URL }}
      TENCENT_IM_SDK_APP_ID: ${{ secrets.TENCENT_IM_SDK_APP_ID }}
      TENCENT_IM_SECRET: ${{ secrets.TENCENT_IM_SECRET }}
      JPUSH_APP_KEY: ${{ secrets.JPUSH_APP_KEY }}
      JPUSH_MASTER_SECRET: ${{ secrets.JPUSH_MASTER_SECRET }}

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: 校验关键 secrets 是否已配置
        shell: bash
        env:
          TC_SECRET_ID: ${{ secrets.TC_SECRET_ID }}
          TC_SECRET_KEY: ${{ secrets.TC_SECRET_KEY }}
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          API_TEST_DATABASE_URL: ${{ secrets.API_TEST_DATABASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          CLOUDBASE_STORAGE_URL: ${{ secrets.CLOUDBASE_STORAGE_URL }}
          TENCENT_IM_SDK_APP_ID: ${{ secrets.TENCENT_IM_SDK_APP_ID }}
          TENCENT_IM_SECRET: ${{ secrets.TENCENT_IM_SECRET }}
          JPUSH_APP_KEY: ${{ secrets.JPUSH_APP_KEY }}
          JPUSH_MASTER_SECRET: ${{ secrets.JPUSH_MASTER_SECRET }}
        run: |
          missing=()
          [[ -z "${TC_SECRET_ID:-}" ]] && missing+=("TC_SECRET_ID")
          [[ -z "${TC_SECRET_KEY:-}" ]] && missing+=("TC_SECRET_KEY")
          [[ -z "${CLOUDBASE_ENV_ID:-}" ]] && missing+=("CLOUDBASE_ENV_ID")
          [[ -z "${JWT_SECRET:-}" ]] && missing+=("JWT_SECRET")
          [[ -z "${API_TEST_DATABASE_URL:-}" ]] && missing+=("API_TEST_DATABASE_URL")
          [[ -z "${UPSTASH_REDIS_REST_URL:-}" ]] && missing+=("UPSTASH_REDIS_REST_URL")
          [[ -z "${UPSTASH_REDIS_REST_TOKEN:-}" ]] && missing+=("UPSTASH_REDIS_REST_TOKEN")
          [[ -z "${CLOUDBASE_STORAGE_URL:-}" ]] && missing+=("CLOUDBASE_STORAGE_URL")
          [[ -z "${TENCENT_IM_SDK_APP_ID:-}" ]] && missing+=("TENCENT_IM_SDK_APP_ID")
          [[ -z "${TENCENT_IM_SECRET:-}" ]] && missing+=("TENCENT_IM_SECRET")
          [[ -z "${JPUSH_APP_KEY:-}" ]] && missing+=("JPUSH_APP_KEY")
          [[ -z "${JPUSH_MASTER_SECRET:-}" ]] && missing+=("JPUSH_MASTER_SECRET")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::以下 secrets 未配置或为空：${missing[*]}。请在仓库 Secrets 中补齐（与腾讯云 CloudBase 服务环境变量及 cloudbaserc.json 中的 {{env.*}} 一致）后重试。"
            exit 1
          fi

      - name: Get pnpm store directory
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('dating_app_api/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --include=dev
        working-directory: ./dating_app_api

      - name: Prisma generate
        run: pnpm exec prisma generate
        working-directory: ./dating_app_api

      - name: Prisma migrate deploy
        run: pnpm exec prisma migrate deploy
        working-directory: ./dating_app_api

      - name: Deploy test to CloudBase
        uses: TencentCloudBase/cloudbase-action@v2.0.1
        with:
          secretId: ${{ secrets.TC_SECRET_ID }}
          secretKey: ${{ secrets.TC_SECRET_KEY }}
          envId: ${{ secrets.CLOUDBASE_ENV_ID }}

  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/api-prod-v')
    runs-on: ubuntu-latest
    environment: production

    env:
      ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
      CLOUDBASE_SERVICE_NAME: dating-app-api
      NODE_ENV: production
      CORS_ENABLED: "true"
      ALLOWED_ORIGINS: "*"
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DATABASE_URL: ${{ secrets.API_PROD_DATABASE_URL }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      CLOUDBASE_STORAGE_URL: ${{ secrets.CLOUDBASE_STORAGE_URL }}
      TENCENT_IM_SDK_APP_ID: ${{ secrets.TENCENT_IM_SDK_APP_ID }}
      TENCENT_IM_SECRET: ${{ secrets.TENCENT_IM_SECRET }}
      JPUSH_APP_KEY: ${{ secrets.JPUSH_APP_KEY }}
      JPUSH_MASTER_SECRET: ${{ secrets.JPUSH_MASTER_SECRET }}

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: 校验关键 secrets 是否已配置
        shell: bash
        env:
          TC_SECRET_ID: ${{ secrets.TC_SECRET_ID }}
          TC_SECRET_KEY: ${{ secrets.TC_SECRET_KEY }}
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          API_PROD_DATABASE_URL: ${{ secrets.API_PROD_DATABASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          CLOUDBASE_STORAGE_URL: ${{ secrets.CLOUDBASE_STORAGE_URL }}
          TENCENT_IM_SDK_APP_ID: ${{ secrets.TENCENT_IM_SDK_APP_ID }}
          TENCENT_IM_SECRET: ${{ secrets.TENCENT_IM_SECRET }}
          JPUSH_APP_KEY: ${{ secrets.JPUSH_APP_KEY }}
          JPUSH_MASTER_SECRET: ${{ secrets.JPUSH_MASTER_SECRET }}
        run: |
          missing=()
          [[ -z "${TC_SECRET_ID:-}" ]] && missing+=("TC_SECRET_ID")
          [[ -z "${TC_SECRET_KEY:-}" ]] && missing+=("TC_SECRET_KEY")
          [[ -z "${CLOUDBASE_ENV_ID:-}" ]] && missing+=("CLOUDBASE_ENV_ID")
          [[ -z "${JWT_SECRET:-}" ]] && missing+=("JWT_SECRET")
          [[ -z "${API_PROD_DATABASE_URL:-}" ]] && missing+=("API_PROD_DATABASE_URL")
          [[ -z "${UPSTASH_REDIS_REST_URL:-}" ]] && missing+=("UPSTASH_REDIS_REST_URL")
          [[ -z "${UPSTASH_REDIS_REST_TOKEN:-}" ]] && missing+=("UPSTASH_REDIS_REST_TOKEN")
          [[ -z "${CLOUDBASE_STORAGE_URL:-}" ]] && missing+=("CLOUDBASE_STORAGE_URL")
          [[ -z "${TENCENT_IM_SDK_APP_ID:-}" ]] && missing+=("TENCENT_IM_SDK_APP_ID")
          [[ -z "${TENCENT_IM_SECRET:-}" ]] && missing+=("TENCENT_IM_SECRET")
          [[ -z "${JPUSH_APP_KEY:-}" ]] && missing+=("JPUSH_APP_KEY")
          [[ -z "${JPUSH_MASTER_SECRET:-}" ]] && missing+=("JPUSH_MASTER_SECRET")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::以下 secrets 未配置或为空：${missing[*]}。请在仓库 Secrets 中补齐（与腾讯云 CloudBase api-prod 环境变量及 cloudbaserc.json 中的 {{env.*}} 一致）后重试。"
            exit 1
          fi

      - name: Get pnpm store directory
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('dating_app_api/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --include=dev
        working-directory: ./dating_app_api

      - name: Prisma generate
        run: pnpm exec prisma generate
        working-directory: ./dating_app_api

      - name: Prisma migrate deploy
        run: pnpm exec prisma migrate deploy
        working-directory: ./dating_app_api

      - name: Deploy production to CloudBase
        uses: TencentCloudBase/cloudbase-action@v2.0.1
        with:
          secretId: ${{ secrets.TC_SECRET_ID }}
          secretKey: ${{ secrets.TC_SECRET_KEY }}
          envId: ${{ secrets.CLOUDBASE_ENV_ID }}