name: dating_app CI

on:
  push:
    paths:
      - "dating_app/**"
      - ".github/workflows/dating_app_ci.yml"
  pull_request:
    paths:
      - "dating_app/**"
      - ".github/workflows/dating_app_ci.yml"

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dating_app

    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.3
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare CI env file
        run: cp .env.development .env

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "未找到 test 目录，跳过测试。"
          fi