name: dating_app_api CI

on:
  push:
    paths:
      - "dating_app_api/**"
      - ".github/workflows/dating_app_api_ci.yml"
  pull_request:
    paths:
      - "dating_app_api/**"
      - ".github/workflows/dating_app_api_ci.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dating_app_api

    env:
      NODE_ENV: test
      # Prisma tooling requires a valid URL string; fork PRs cannot read repo secrets.
      DATABASE_URL: ${{ secrets.API_TEST_DATABASE_URL || 'mysql://ci_placeholder:ci_placeholder@127.0.0.1:3306/ci_placeholder' }}
      # CI-only JWT so integration tests can run without Repository secrets (not used in deploy).
      JWT_SECRET: github-actions-ci-jwt-placeholder-not-for-production

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Get pnpm store directory
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('dating_app_api/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test