name: dating_app
description: "Dating app frontend based on Flutter + GetX."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.1.0
  socket_io_client: ^3.0.0-beta.2
  tencent_im_sdk_plugin: ^5.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  retrofit_generator: ^9.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default:21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/fonts/
  fonts:
    - family: IconFont
      fonts:
        - asset: assets/fonts/iconfont.ttf
